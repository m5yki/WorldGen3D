# ==========================================================
# BIOME: TAİGA (Taiga)
# Sıcaklık/Nem Matrisi: temp=0.18, humid=0.68
# Konumu: Soğuk-nemli. Tundra ile Forest arasında.
# ==========================================================
name: "Taiga"
temperature: 0.18
humidity: 0.68

ore-profile: "default_ores"
tree-profile: "taiga_trees"

terrain:
  type: "NORMAL"
  base-height: 69
  height-variation: 25
  roughness: 0.009
  water-level: 62

river:
  enabled: true
  width: 0.055
  depth: 13

blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:70"
    - "minecraft:podzol:20"
    - "minecraft:coarse_dirt:10"
  rocky:
    - "minecraft:stone:80"
    - "minecraft:cobblestone:20"
  sub:
    - "minecraft:dirt:80"
    - "minecraft:coarse_dirt:20"
  deep:
    - "minecraft:stone:90"
    - "minecraft:andesite:10"

flora:
  grass-chance: 28
  flowers:
    chance: 8
    types:
      - "minecraft:fern:60"
      - "minecraft:sweet_berry_bush:40"

caves:
  mode: "BOTH"
  noise-frequency: 0.044
  threshold: 0.58
  spaghetti-threshold: 0.024
  dynamic-lava: true
  base-lava-level: -54

canyon:
  enabled: false
glacier:
  enabled: false
trench:
  enabled: false
floating-islands:
  enabled: false
