name: "Taiga"
temperature: 0.2
humidity: 0.7
color-style: "DARK_GREEN"

ore-profile: "default_ores"
tree-profile: "taiga_trees"

terrain:
  type: "NORMAL"
  base-height: 70
  height-variation: 16
  roughness: 0.008

river:
  enabled: true
  width: 0.08
  depth: 16

blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:85"
    - "minecraft:coarse_dirt:10"
    - "minecraft:podzol:5"
  sub:
    - "minecraft:dirt:90"
    - "minecraft:coarse_dirt:10"
  deep:
    - "minecraft:stone:95"
    - "minecraft:andesite:5"

flora:
  grass-chance: 30
  flowers:
    chance: 10
    types:
      - "minecraft:fern"
      - "minecraft:sweet_berry_bush"

caves:
  mode: "CUSTOM"
  noise-frequency: 0.035
  threshold: 0.65
  dynamic-lava: true
  base-lava-level: -54