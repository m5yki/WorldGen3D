name: "Savanna"
temperature: 0.8
humidity: 0.2
color-style: "OLIVE"

ore-profile: "default_ores"
tree-profile: "savanna_trees"

terrain:
  type: "CANYON"
  base-height: 72
  height-variation: 20
  roughness: 0.006

river:
  enabled: true
  width: 0.08
  depth: 16

blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:85"
    - "minecraft:coarse_dirt:10"
    - "minecraft:podzol:5"
  sub:
    - "minecraft:dirt:90"
    - "minecraft:coarse_dirt:10"
  deep:
    - "minecraft:stone:95"
    - "minecraft:andesite:5"

flora:
  grass-chance: 60
  flowers:
    chance: 2
    types:
      - "minecraft:tall_grass"

caves:
  mode: "CUSTOM"
  noise-frequency: 0.035
  threshold: 0.65
  dynamic-lava: true
  base-lava-level: -54