# ==========================================================
# BIOME: ORMAN (Forest)
# ==========================================================
name: "Forest"
temperature: 0.55
humidity: 0.7
color-style: "BRIGHT_GREEN"

# --- Modüler Bağlantılar (YENİ SİSTEM) ---
ore-profile: "default_ores"  # data/ores/default_ores.yml dosyasını okuyacak
tree-profile: "forest_trees" # data/trees/forest_trees.yml dosyasını okuyacak

# --- Arazi Matematigi (3D Noise Ayarlari) ---
terrain:
  type: "NORMAL"
  base-height: 68
  height-variation: 12
  roughness: 0.007

river:
  enabled: true
  width: 0.08
  depth: 16

# --- Katmanlar ve Bloklar ---
blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:85"
    - "minecraft:coarse_dirt:10"
    - "minecraft:podzol:5"
  sub:
    - "minecraft:dirt:90"
    - "minecraft:coarse_dirt:10"
  deep:
    - "minecraft:stone:95"
    - "minecraft:andesite:5"

# --- Yuzey Suslemeleri (Flora) ---
flora:
  grass-chance: 40
  flowers:
    chance: 5
    types:
      - "minecraft:dandelion"
      - "minecraft:poppy"

# --- MAĞARALAR (3D Noise & Vanilla) ---
caves:
  mode: "CUSTOM"
  noise-frequency: 0.035
  threshold: 0.65
  dynamic-lava: true
  base-lava-level: -54