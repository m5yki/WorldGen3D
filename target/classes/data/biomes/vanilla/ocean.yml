# ==========================================================
# BIOME: OKYANUS (Ocean)
# Continent noise tarafından atanır, matrise girmez.
# ==========================================================
name: "Ocean"
temperature: 0.42
humidity: 0.60

ore-profile: "default_ores"
tree-profile: "none"

terrain:
  type: "NORMAL"
  base-height: 30
  height-variation: 18
  roughness: 0.012
  water-level: 62

river:
  enabled: false

blocks:
  sub-depth: 4
  surface:
    - "minecraft:gravel:55"
    - "minecraft:sand:30"
    - "minecraft:clay:15"
  rocky:
    - "minecraft:stone:100"
  sub:
    - "minecraft:gravel:70"
    - "minecraft:sand:30"
  deep:
    - "minecraft:stone:95"
    - "minecraft:andesite:5"

flora:
  grass-chance: 0
  flowers:
    chance: 0
    types: []

caves:
  mode: "BOTH"
  noise-frequency: 0.040
  threshold: 0.60
  spaghetti-threshold: 0.022
  dynamic-lava: true
  base-lava-level: -54

trench:
  enabled: true
  extra-depth: 40

glacier:
  enabled: false

floating-islands:
  enabled: false

canyon:
  enabled: false
