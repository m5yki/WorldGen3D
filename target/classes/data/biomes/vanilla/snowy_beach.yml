  deep:
    - "minecraft:stone:100"

flora:
  grass-chance: 0
  flowers:
    chance: 0
    types: []

caves:
  mode: "NONE"
  noise-frequency: 0.035
  threshold: 0.65
  spaghetti-threshold: 0.020
  dynamic-lava: false
  base-lava-level: -54

canyon:
  enabled: false
glacier:
  enabled: false
trench:
  enabled: false
floating-islands:
  enabled: false
