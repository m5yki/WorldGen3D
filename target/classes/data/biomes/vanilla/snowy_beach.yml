name: "Snowy_Beach"
temperature: 0.06
humidity: 0.22

ore-profile: "default_ores"
tree-profile: "none"

terrain:
  type: "SMOOTH"
  base-height: 63
  height-variation: 4
  roughness: 0.004
  water-level: 62

river:
  enabled: false

blocks:
  sub-depth: 3
  surface:
    - "minecraft:snow_block:60"
    - "minecraft:sand:40"
  rocky:
    - "minecraft:stone:70"
    - "minecraft:packed_ice:30"
