# ==========================================================
# BIOME: ORMAN (Forest)
# Sıcaklık/Nem Matrisi: temp=0.55, humid=0.65
# Konumu: Ilık-nemli. Plains ile Jungle/Swamp arasında.
# ==========================================================
name: "Forest"
temperature: 0.55
humidity: 0.65

ore-profile: "default_ores"
tree-profile: "forest_trees"

terrain:
  type: "NORMAL"
  base-height: 68
  height-variation: 28
  roughness: 0.009
  water-level: 62

river:
  enabled: true
  width: 0.06
  depth: 14

blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:80"
    - "minecraft:coarse_dirt:12"
    - "minecraft:podzol:8"
  rocky:
    - "minecraft:stone:75"
    - "minecraft:mossy_cobblestone:25"
  sub:
    - "minecraft:dirt:88"
    - "minecraft:coarse_dirt:12"
  deep:
    - "minecraft:stone:90"
    - "minecraft:andesite:10"

flora:
  grass-chance: 45
  flowers:
    chance: 8
    types:
      - "minecraft:dandelion:40"
      - "minecraft:poppy:35"
      - "minecraft:lily_of_the_valley:25"

caves:
  mode: "BOTH"
  noise-frequency: 0.045
  threshold: 0.57
  spaghetti-threshold: 0.025
  dynamic-lava: true
  base-lava-level: -54

canyon:
  enabled: false
glacier:
  enabled: false
trench:
  enabled: false
floating-islands:
  enabled: false
