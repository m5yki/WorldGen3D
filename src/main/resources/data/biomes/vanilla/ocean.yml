# ==========================================================
# BIOME: STANDART OKYANUS (Normal Ocean)
# ==========================================================
name: "Ocean"
temperature: 0.5  # Ne çok sıcak ne çok soğuk
humidity: 1.0     # Maksimum nem
color-style: "WATER"

terrain:
  type: "NORMAL"
  base-height: 35       # Derin okyanus tabanı
  height-variation: 15  # Deniz altındaki tepecikler
  roughness: 0.010      # Yumuşak deniz tabanı
  water-level: 62       # 35 ile 62 arası suyla dolacak

river:
  enabled: false  # Okyanusun içinde nehir olmaz

blocks:
  sub-depth: 4
  surface:
    - "minecraft:gravel:60"
    - "minecraft:sand:40"
  sub:
    - "minecraft:gravel:50"
    - "minecraft:sand:50"
  deep:
    - "minecraft:stone:95"
    - "minecraft:andesite:5"

flora:
  grass-chance: 0
  flowers:
    chance: 0
    types: []
  water-flora:
    seagrass-chance: 50    # Bolca deniz çayırı
    kelp-chance: 30        # Yüzeye uzanan dev yosunlar

schematics:
  trees:
    enabled: false

caves:
  mode: "CUSTOM"
  noise-frequency: 0.035
  threshold: 0.65
  dynamic-lava: false # Suyun hemen altında lav havuzu çıkmasını engelledik

# --- YENİ MADENLER (Dinamik Damar & Mağara Temas Kontrolü) ---
ores:
  coal:
    block: "minecraft:coal_ore"
    type: "triangle"
    min-height: 0
    max-height: 128
    center-height: 60
    vein-size-min: 6
    vein-size-max: 14
    exposure-chance: 100
    chance: 30

  iron:
    block: "minecraft:iron_ore"
    type: "triangle"
    min-height: -64
    max-height: 64
    center-height: 16
    vein-size-min: 4
    vein-size-max: 9
    exposure-chance: 80
    chance: 20

  gold:
    block: "minecraft:gold_ore"
    type: "triangle"
    min-height: -64
    max-height: 32
    center-height: -16
    vein-size-min: 3
    vein-size-max: 7
    exposure-chance: 50
    chance: 8

  diamond:
    block: "minecraft:diamond_ore"
    type: "triangle"
    min-height: -64
    max-height: 16
    center-height: -58
    vein-size-min: 1
    vein-size-max: 4
    exposure-chance: 20
    chance: 6