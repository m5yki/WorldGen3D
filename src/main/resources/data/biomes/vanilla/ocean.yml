name: "Ocean"
temperature: 0.4
humidity: 0.6
color-style: "AQUA"

ore-profile: "default_ores"
tree-profile: "none"

terrain:
  type: "NORMAL"
  base-height: 35
  height-variation: 15
  roughness: 0.010
  water-level: 62

river:
  enabled: true
  width: 0.08
  depth: 16

blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:85"
    - "minecraft:coarse_dirt:10"
    - "minecraft:podzol:5"
  sub:
    - "minecraft:dirt:90"
    - "minecraft:coarse_dirt:10"
  deep:
    - "minecraft:stone:95"
    - "minecraft:andesite:5"

ocean-floor:
  enabled: true
  chance: 15
  blocks:
    - "minecraft:brain_coral_block"
    - "minecraft:tube_coral_block"
    - "minecraft:bubble_coral_block"
    - "minecraft:fire_coral_block"

flora:
  grass-chance: 10
  flowers:
    chance: 5
    types:
      - "minecraft:dandelion"
  water-flora:
    seagrass-chance: 40
    kelp-chance: 20
  coastal-flora:
    sugarcane-chance: 15

caves:
  mode: "CUSTOM"
  noise-frequency: 0.035
  threshold: 0.65
  dynamic-lava: true
  base-lava-level: -54