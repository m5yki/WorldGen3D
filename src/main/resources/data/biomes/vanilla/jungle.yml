name: "Jungle"
temperature: 0.9
humidity: 1.0
color-style: "BRIGHT_GREEN"

ore-profile: "default_ores"
tree-profile: "jungle_trees"

terrain:
  type: "NORMAL"
  base-height: 70
  height-variation: 40
  roughness: 0.025

river:
  enabled: true
  width: 0.08
  depth: 16

blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:85"
    - "minecraft:coarse_dirt:10"
    - "minecraft:podzol:5"
  sub:
    - "minecraft:dirt:90"
    - "minecraft:coarse_dirt:10"
  deep:
    - "minecraft:stone:95"
    - "minecraft:andesite:5"

flora:
  grass-chance: 90
  flowers:
    chance: 20
    types:
      - "minecraft:fern"
      - "minecraft:large_fern"
      - "minecraft:melon"

caves:
  mode: "CUSTOM"
  noise-frequency: 0.035
  threshold: 0.65
  dynamic-lava: true
  base-lava-level: -54