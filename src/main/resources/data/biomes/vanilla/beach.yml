name: "Beach"
temperature: 0.6
humidity: 0.6
color-style: "NORMAL"

# YENİ SİSTEM: Modüler Bağlantılar
ore-profile: "default_ores"
tree-profile: "none" # Sahillerde genelde ağaç olmaz, ama ileride palmiye eklemek istersen "beach_trees" yapabilirsin!

terrain:
  type: "SMOOTH"
  base-height: 63
  height-variation: 3
  roughness: 0.003

river:
  enabled: false
  width: 0.08
  depth: 16

blocks:
  sub-depth: 3
  surface:
    - "minecraft:sand:100"
  sub:
    - "minecraft:sand:80"
    - "minecraft:sandstone:20"
  deep:
    - "minecraft:stone:100"

flora:
  grass-chance: 0
  flowers:
    chance: 0
    types: []
  coastal-flora:
    sugarcane-chance: 25

caves:
  mode: "NONE"
  noise-frequency: 0.035
  threshold: 0.65
  dynamic-lava: false
  base-lava-level: -54