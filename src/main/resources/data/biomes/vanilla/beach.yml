# ==========================================================
# BIOME: SAHİL (Beach)
# Continent noise [-0.08, 0.0) bandında çıkar.
# Dar bant → kıyılar gerçekçi ve ince.
# ==========================================================
name: "Beach"
temperature: 0.60
humidity: 0.55

ore-profile: "default_ores"
tree-profile: "none"

terrain:
  type: "SMOOTH"
  base-height: 63
  height-variation: 4
  roughness: 0.004
  water-level: 62

river:
  enabled: false

blocks:
  sub-depth: 3
  surface:
    - "minecraft:sand:100"
  rocky:
    - "minecraft:sandstone:100"
  sub:
    - "minecraft:sand:80"
    - "minecraft:sandstone:20"
  deep:
    - "minecraft:stone:100"

flora:
  grass-chance: 0
  flowers:
    chance: 0
    types: []

caves:
  mode: "NONE"
  noise-frequency: 0.035
  threshold: 0.65
  spaghetti-threshold: 0.020
  dynamic-lava: false
  base-lava-level: -54

canyon:
  enabled: false
glacier:
  enabled: false
trench:
  enabled: false
floating-islands:
  enabled: false
