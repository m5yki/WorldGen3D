# ==========================================================
# BIOME: OVALIK (Plains)
# Sıcaklık/Nem Matrisi: temp=0.45, humid=0.30
# Konumu: Ilık-kuru merkez. Forest ile Desert arasında tampon.
# ==========================================================
name: "Plains"
temperature: 0.45
humidity: 0.30

ore-profile: "default_ores"
tree-profile: "none"

terrain:
  type: "NORMAL"
  base-height: 66
  height-variation: 18
  roughness: 0.006
  water-level: 62

river:
  enabled: true
  width: 0.06
  depth: 12

blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:88"
    - "minecraft:coarse_dirt:12"
  rocky:
    - "minecraft:stone:80"
    - "minecraft:cobblestone:20"
  sub:
    - "minecraft:dirt:90"
    - "minecraft:coarse_dirt:10"
  deep:
    - "minecraft:stone:90"
    - "minecraft:andesite:10"

flora:
  grass-chance: 65
  flowers:
    chance: 12
    types:
      - "minecraft:dandelion:50"
      - "minecraft:cornflower:30"
      - "minecraft:azure_bluet:20"

caves:
  mode: "BOTH"
  noise-frequency: 0.045
  threshold: 0.58
  spaghetti-threshold: 0.025
  dynamic-lava: true
  base-lava-level: -54

canyon:
  enabled: false
glacier:
  enabled: false
trench:
  enabled: false
floating-islands:
  enabled: false
