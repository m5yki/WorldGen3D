name: "Plains"
temperature: 0.5
humidity: 0.35
color-style: "NORMAL"

ore-profile: "default_ores"
tree-profile: "none" # Ovalarda ağaç olmaz, düzlüktür.

terrain:
  type: "NORMAL"
  base-height: 64
  height-variation: 10
  roughness: 0.005

river:
  enabled: true
  width: 0.08
  depth: 16

blocks:
  sub-depth: 4
  surface:
    - "minecraft:grass_block:85"
    - "minecraft:coarse_dirt:10"
    - "minecraft:podzol:5"
  sub:
    - "minecraft:dirt:90"
    - "minecraft:coarse_dirt:10"
  deep:
    - "minecraft:stone:95"
    - "minecraft:andesite:5"
  rocky:
    - "minecraft:stone:80"
    - "minecraft:cobblestone:15"
    - "minecraft:mossy_cobblestone:5"

flora:
  grass-chance: 70
  flowers:
    chance: 15
    types:
      - "minecraft:cornflower"
      - "minecraft:azure_bluet"

caves:
  mode: "CUSTOM"
  noise-frequency: 0.040
  threshold: 0.60
  dynamic-lava: true
  base-lava-level: -54