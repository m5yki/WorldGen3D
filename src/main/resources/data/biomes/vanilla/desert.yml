# ==========================================================
# BIOME: ÇÖL (Desert)
# Sıcaklık/Nem Matrisi: temp=0.95, humid=0.05
# Konumu: Matrisin sağ-alt köşesi. En sıcak ve kuru biyom.
# Kıyı tamponu sayesinde hiçbir zaman okyanusla doğrudan
# bitişmez — araya her zaman Savanna veya Beach girer.
# ==========================================================
name: "Desert"
temperature: 0.95
humidity: 0.05

ore-profile: "default_ores"
tree-profile: "none"

terrain:
  type: "NORMAL"
  base-height: 68
  height-variation: 32
  roughness: 0.010
  water-level: 62

river:
  enabled: false

blocks:
  sub-depth: 5
  surface:
    - "minecraft:sand:100"
  rocky:
    - "minecraft:sandstone:70"
    - "minecraft:smooth_sandstone:30"
  sub:
    - "minecraft:sand:75"
    - "minecraft:sandstone:25"
  deep:
    - "minecraft:stone:80"
    - "minecraft:sandstone:20"

flora:
  grass-chance: 0
  flowers:
    chance: 3
    types:
      - "minecraft:dead_bush:100"

caves:
  mode: "BOTH"
  noise-frequency: 0.042
  threshold: 0.59
  spaghetti-threshold: 0.022
  dynamic-lava: true
  base-lava-level: -54

canyon:
  enabled: true
  noise-frequency: 0.0018
  width: 0.050
  depth: 55

glacier:
  enabled: false
  
trench:
  enabled: false

floating-islands:
  enabled: false
